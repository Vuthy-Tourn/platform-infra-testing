{{- range $service := .Values.services }}
{{- $ctx := dict "root" $ "service" $service }}
{{- $autoscaling := $service.autoscaling | default $.Values.defaults.autoscaling }}
{{- if $autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "tenant-app.serviceName" $ctx }}
  namespace: {{ $.Values.workspace.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: {{ include "tenant-app.syncWave" $ctx | quote }}
  labels:
    {{- include "tenant-app.labels" $ctx | nindent 4 }}
spec:
  minReplicas: {{ $autoscaling.minReplicas }}
  maxReplicas: {{ $autoscaling.maxReplicas }}
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "tenant-app.serviceName" $ctx }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ $autoscaling.targetCPUUtilizationPercentage }}
---
{{- end }}
{{- end }}
