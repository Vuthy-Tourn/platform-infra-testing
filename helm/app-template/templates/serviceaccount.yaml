{{- range $service := .Values.services }}
{{- $ctx := dict "root" $ "service" $service }}
{{- $serviceAccount := $service.serviceAccount | default (dict "create" true "name" "") }}
{{- if (default true $serviceAccount.create) }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "tenant-app.serviceAccountName" $ctx }}
  namespace: {{ $.Values.workspace.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: {{ include "tenant-app.syncWave" $ctx | quote }}
    {{- with $serviceAccount.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  labels:
    {{- include "tenant-app.labels" $ctx | nindent 4 }}
{{- if $.Values.imagePullSecrets }}
imagePullSecrets:
  {{- toYaml $.Values.imagePullSecrets | nindent 2 }}
{{- end }}
---
{{- end }}
{{- end }}
