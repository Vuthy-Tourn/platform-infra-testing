{{- range $service := .Values.services }}
{{- $ctx := dict "root" $ "service" $service }}
{{- if $service.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "tenant-app.serviceName" $ctx }}
  namespace: {{ $.Values.workspace.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: {{ include "tenant-app.syncWave" $ctx | quote }}
    {{- with $service.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  labels:
    {{- include "tenant-app.labels" $ctx | nindent 4 }}
spec:
  ingressClassName: {{ $service.ingress.className }}
  {{- if $service.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ $service.host }}
      secretName: {{ default (printf "%s-tls" (include "tenant-app.serviceName" $ctx)) $service.ingress.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ $service.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "tenant-app.serviceName" $ctx }}
                port:
                  number: {{ $service.servicePort }}
---
{{- end }}
{{- end }}
